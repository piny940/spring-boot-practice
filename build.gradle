plugins {
    id 'java'
}

group 'com.piny940'
version '1.0'

sourceCompatibility = 21

repositories {
    mavenCentral()
}

dependencies {
}

jar {
    manifest {
        attributes 'Main-Class': 'com.piny940.HelloWorld'
    }
    from {
        configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) }
    }
}